<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘 뭐 먹지?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root[data-theme="dark"] {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #333;
      --text: #ffffff;
      --text-sub: #999;
      --accent: #f5e642;
      --accent-hover: #ffe000;
      --delivery: #ff6b35;
      --cook: #4ecdc4;
      --card-shadow: 0 4px 24px rgba(0,0,0,0.6);
      --modal-bg: rgba(0,0,0,0.85);
    }
    :root[data-theme="light"] {
      --bg: #f0f0f0;
      --surface: #ffffff;
      --surface2: #e8e8e8;
      --border: #ddd;
      --text: #111;
      --text-sub: #666;
      --accent: #111;
      --accent-hover: #333;
      --delivery: #e55a2b;
      --cook: #2a9d8f;
      --card-shadow: 0 4px 24px rgba(0,0,0,0.12);
      --modal-bg: rgba(0,0,0,0.6);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', system-ui, sans-serif;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
    }
    .app-title {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1;
    }
    .app-title span { color: var(--accent); }
    .theme-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s, transform 0.1s;
    }
    .theme-btn:hover { background: var(--border); transform: scale(1.04); }

    /* ── MAIN ── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 36px 20px 60px;
    }
    .subtitle {
      text-align: center;
      color: var(--text-sub);
      font-size: 0.9rem;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    /* ── MEAL CARDS ── */
    .meal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }
    .meal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: var(--card-shadow);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .meal-card:hover { transform: translateY(-4px); box-shadow: 0 12px 36px rgba(0,0,0,0.3); }
    .meal-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .meal-emoji { font-size: 2.4rem; }
    .meal-label { font-size: 1.3rem; font-weight: 900; }
    .meal-sub { font-size: 0.78rem; color: var(--text-sub); margin-top: 2px; }
    .action-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .action-btn {
      border: none;
      border-radius: 12px;
      padding: 14px 10px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: transform 0.15s, filter 0.15s;
    }
    .action-btn:hover { transform: scale(1.04); filter: brightness(1.15); }
    .action-btn:active { transform: scale(0.97); }
    .action-btn .btn-emoji { font-size: 1.6rem; }
    .btn-delivery {
      background: var(--delivery);
      color: #fff;
    }
    .btn-cook {
      background: var(--cook);
      color: #fff;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: var(--modal-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      padding: 20px;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px 28px;
      width: 100%;
      max-width: 520px;
      max-height: 88vh;
      overflow-y: auto;
      transform: translateY(30px) scale(0.96);
      transition: transform 0.3s;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal-overlay.open .modal { transform: translateY(0) scale(1); }
    .modal-close {
      float: right;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      width: 34px; height: 34px;
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      margin-left: 10px;
    }
    .modal-context {
      font-size: 0.8rem;
      color: var(--text-sub);
      margin-bottom: 18px;
    }

    /* ── SLOT MACHINE ── */
    .slot-wrapper {
      text-align: center;
      padding: 20px 0 28px;
      position: relative;
      overflow: visible;
    }
    .slot-display {
      font-size: 3.2rem;
      font-weight: 900;
      letter-spacing: -1px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      position: relative;
      transition: box-shadow 0.1s;
    }
    .slot-display.glow {
      animation: displayGlow 0.9s ease-out forwards;
    }
    @keyframes displayGlow {
      0%   { box-shadow: 0 0 0 0 rgba(245,230,66,0); background: transparent; }
      20%  { box-shadow: 0 0 0 10px rgba(245,230,66,0.55), 0 0 50px rgba(245,230,66,0.3); background: rgba(245,230,66,0.08); }
      100% { box-shadow: 0 0 0 0 rgba(245,230,66,0); background: transparent; }
    }
    .slot-text {
      display: inline-block;
    }
    .slot-text.landing {
      animation: slotLand 0.65s cubic-bezier(.17,.67,.35,1.45) forwards;
    }
    @keyframes slotLand {
      0%   { transform: scale(2.2); opacity: 0; filter: blur(8px); }
      45%  { transform: scale(0.88); opacity: 1; filter: blur(0); }
      68%  { transform: scale(1.14); }
      84%  { transform: scale(0.97); }
      100% { transform: scale(1); }
    }
    .slot-result-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #111;
      border-radius: 50px;
      padding: 6px 18px;
      font-size: 0.85rem;
      font-weight: 700;
      margin-top: 8px;
      transform-origin: center;
    }
    .slot-result-badge.pop {
      animation: badgePop 0.55s cubic-bezier(.17,.67,.35,1.5) forwards;
    }
    @keyframes badgePop {
      0%   { transform: scale(0.3); opacity: 0; }
      65%  { transform: scale(1.12); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .confetti-piece {
      position: absolute;
      pointer-events: none;
      z-index: 20;
      border-radius: 2px;
    }
    @keyframes confettiFly {
      0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
      100% { transform: translate(var(--cx),var(--cy)) rotate(var(--cr)) scale(0.2); opacity: 0; }
    }

    /* ── DELIVERY RESULT ── */
    .delivery-result { margin-top: 4px; }
    .delivery-result h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-sub);
    }
    .delivery-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 6px 14px;
      font-size: 0.88rem;
      font-weight: 700;
    }
    .delivery-tip {
      margin-top: 16px;
      background: var(--surface2);
      border-left: 3px solid var(--delivery);
      border-radius: 0 10px 10px 0;
      padding: 12px 14px;
      font-size: 0.83rem;
      color: var(--text-sub);
      line-height: 1.5;
    }
    .app-link-section {
      margin-top: 20px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }
    .app-link-label {
      font-size: 0.8rem;
      color: var(--text-sub);
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .app-link-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .app-link-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 16px 10px;
      border-radius: 14px;
      font-family: inherit;
      font-size: 0.92rem;
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: filter 0.15s, transform 0.12s;
      letter-spacing: -0.3px;
    }
    .app-link-btn:hover { filter: brightness(1.12); transform: translateY(-2px); }
    .app-link-btn:active { transform: scale(0.97); }
    .app-link-btn .app-sub {
      font-size: 0.72rem;
      font-weight: 400;
      opacity: 0.85;
      letter-spacing: 0;
    }
    .btn-baemin { background: #3AAA35; color: #fff; }
    .btn-coupang { background: #C0392B; color: #fff; }
    .app-link-note {
      margin-top: 10px;
      font-size: 0.75rem;
      color: var(--text-sub);
      text-align: center;
      line-height: 1.5;
    }

    /* ── RECIPE CARDS ── */
    .recipe-section h3 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-sub);
      margin-bottom: 14px;
    }
    .recipe-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 14px;
    }
    .recipe-head {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 14px;
    }
    .recipe-icon { font-size: 2.4rem; flex-shrink: 0; }
    .recipe-title { font-size: 1.05rem; font-weight: 900; }
    .recipe-chef {
      font-size: 0.78rem;
      color: var(--text-sub);
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .recipe-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .meta-tag {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 3px 10px;
      font-size: 0.77rem;
      color: var(--text-sub);
    }
    .recipe-ingredients {
      margin-bottom: 12px;
    }
    .recipe-ingredients h4, .recipe-steps h4 {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-sub);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .ingredient-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .ing {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 9px;
      font-size: 0.8rem;
    }
    .step-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .step-item {
      display: flex;
      gap: 10px;
      font-size: 0.85rem;
      line-height: 1.5;
    }
    .step-num {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--accent);
      color: #111;
      font-size: 0.72rem;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
    }
    .rating { color: #f5c842; }

    /* ── REROLL BTN ── */
    .reroll-btn {
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      border: 2px dashed var(--border);
      background: transparent;
      color: var(--text-sub);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .reroll-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--surface2);
    }

    /* ── WEATHER PANEL ── */
    .weather-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s, transform 0.1s;
    }
    .weather-btn:hover { background: var(--border); transform: scale(1.04); }
    .weather-btn.active { border-color: var(--cook); color: var(--cook); }
    .weather-panel {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.45s ease, padding 0.3s;
      padding: 0 28px;
    }
    .weather-panel.open {
      max-height: 700px;
      padding: 24px 28px;
    }
    .weather-loading {
      text-align: center;
      padding: 20px;
      color: var(--text-sub);
      font-size: 0.9rem;
    }
    .weather-main {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 22px;
    }
    .weather-icon-big { font-size: 3.6rem; line-height: 1; }
    .weather-temp-num {
      font-size: 3rem;
      font-weight: 900;
      line-height: 1;
    }
    .weather-desc { font-size: 1rem; color: var(--text-sub); margin-top: 4px; }
    .weather-location { font-size: 0.78rem; color: var(--text-sub); margin-top: 3px; }
    .weather-rec-btn {
      width: 100%;
      margin-top: 4px;
      padding: 13px 16px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.2s, color 0.2s;
    }
    .weather-rec-btn:hover { border-color: var(--cook); color: var(--cook); }
    .weather-rec-btn.open { border-color: var(--cook); color: var(--cook); }
    .weather-rec-arrow { transition: transform 0.3s; display: inline-block; }
    .weather-rec-btn.open .weather-rec-arrow { transform: rotate(180deg); }
    .weather-rec-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.42s ease;
    }
    .weather-rec-body.open { max-height: 900px; }
    .weather-rec-inner { padding-top: 16px; }
    .weather-rec-title {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-sub);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .weather-food-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 4px;
    }
    .weather-food-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      transition: transform 0.15s;
    }
    .weather-food-card:hover { transform: translateY(-2px); }
    .weather-food-name { font-size: 1rem; font-weight: 900; }
    .weather-food-reason { font-size: 0.75rem; color: var(--text-sub); margin-top: 4px; line-height: 1.45; }
    .weather-error {
      text-align: center;
      padding: 16px;
      color: var(--text-sub);
      font-size: 0.85rem;
      line-height: 1.6;
    }

    /* ── DISQUS ── */
    .disqus-section {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 20px 40px;
      border-top: 1px solid var(--border);
    }
    .disqus-section-title {
      font-size: 1.1rem;
      font-weight: 900;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #disqus_thread a { color: var(--accent) !important; }

    /* ── FOOTER ── */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 24px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .footer-copy {
      font-size: 0.78rem;
      color: var(--text-sub);
    }
    .partner-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 18px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
    }
    .partner-btn:hover { border-color: var(--accent); color: var(--accent); transform: scale(1.03); }

    /* ── PARTNER MODAL ── */
    .partner-overlay {
      position: fixed;
      inset: 0;
      background: var(--modal-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      padding: 20px;
    }
    .partner-overlay.open { opacity: 1; pointer-events: all; }
    .partner-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px 28px;
      width: 100%;
      max-width: 460px;
      transform: translateY(28px) scale(0.96);
      transition: transform 0.3s;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .partner-overlay.open .partner-modal { transform: translateY(0) scale(1); }
    .partner-modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .partner-modal-title { font-size: 1.25rem; font-weight: 900; }
    .partner-modal-desc { font-size: 0.83rem; color: var(--text-sub); margin-bottom: 22px; line-height: 1.5; }
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-sub);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .form-input, .form-textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 0.9rem;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      resize: none;
    }
    .form-input:focus, .form-textarea:focus { border-color: var(--accent); }
    .form-textarea { height: 100px; }
    .form-submit {
      width: 100%;
      margin-top: 6px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: #111;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      transition: filter 0.15s, transform 0.1s;
    }
    .form-submit:hover { filter: brightness(1.1); transform: scale(1.01); }
    .form-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .form-success {
      text-align: center;
      padding: 20px 0;
    }
    .form-success-icon { font-size: 3rem; margin-bottom: 12px; }
    .form-success-title { font-size: 1.1rem; font-weight: 900; margin-bottom: 6px; }
    .form-success-desc { font-size: 0.85rem; color: var(--text-sub); line-height: 1.6; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="app-title">오늘 <span>뭐 먹지</span>? 🍽️</div>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="weather-btn" id="weatherBtn" onclick="toggleWeather()">
      <span id="weatherBtnIcon">🌤️</span>
      <span id="weatherBtnLabel">오늘 날씨</span>
    </button>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">
      <span id="themeIcon">☀️</span>
      <span id="themeLabel">라이트 모드</span>
    </button>
  </div>
</header>

<div class="weather-panel" id="weatherPanel">
  <div id="weatherContent">
    <div class="weather-loading">📍 위치를 확인하고 있어요...</div>
  </div>
</div>

<main>
  <p class="subtitle">
    매일 반복되는 고민... 이제 그만해.<br>

let currentMeal = '';
let currentType = '';

function openModal(meal, type) {
  currentMeal = meal;
  currentType = type;
  document.getElementById('modalContext').textContent =
    `${meal === '아침' ? '☀️' : meal === '점심' ? '🌞' : '🌕'} ${meal}  ·  ${type === '배달' ? '🛵 배달' : '🧑‍🍳 요리'}`;
  document.getElementById('resultBody').innerHTML = '';
  document.getElementById('rerollBtn').style.display = 'none';
  document.getElementById('resultBadge').style.display = 'none';

  document.getElementById('modalOverlay').classList.add('open');
  startSlot();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function closeOnBg(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function startSlot() {
  const slotEl = document.getElementById('slotText');
  slotEl.className = 'slot-text';
  const picked = CATEGORIES[Math.floor(Math.random() * CATEGORIES.length)];
  let tick = 0;
  let delay = 60;

  (function spin() {
    slotEl.textContent = CATEGORIES[tick++ % CATEGORIES.length];
    delay = Math.min(delay * 1.09, 290);
    if (delay >= 290) {
      slotEl.textContent = picked;
      slotEl.className = 'slot-text landing';
      currentFood = picked;
      triggerWinEffect();
      setTimeout(() => {
        const wrap = document.getElementById('resultBadge');
        const badge = document.getElementById('badgeContent');
        badge.textContent = `${EMOJI_MAP[picked]} ${picked} 확정!`;
        wrap.style.display = 'block';
        badge.classList.remove('pop');
        void badge.offsetWidth;
        badge.classList.add('pop');
      }, 260);
      setTimeout(() => {
        document.getElementById('rerollBtn').style.display = 'block';
        showResult(picked);
      }, 560);
      return;
    }
    setTimeout(spin, delay);
  })();
}

function triggerWinEffect() {
  const display = document.getElementById('slotDisplay');
  display.classList.remove('glow');
  void display.offsetWidth;
  display.classList.add('glow');
  setTimeout(() => display.classList.remove('glow'), 900);

  const wrapper = document.getElementById('slotWrapper');
  const colors = ['#f5e642','#ff6b35','#4ecdc4','#ff4081','#a78bfa','#34d399','#fbbf24'];
  for (let i = 0; i < 44; i++) {
    const el = document.createElement('div');
    const angle = (i / 44) * Math.PI * 2;
    const dist = 60 + Math.random() * 120;
    const size = 5 + Math.random() * 8;
    const dur = 0.6 + Math.random() * 0.75;
    el.className = 'confetti-piece';
    el.style.cssText = `width:${size}px;height:${size}px;background:${colors[i%colors.length]};border-radius:${i%3===0?'50%':'3px'};left:calc(50% - ${size/2}px);top:calc(50% - ${size/2}px);--cx:${Math.cos(angle)*dist}px;--cy:${Math.sin(angle)*dist-20}px;--cr:${Math.random()*720-360}deg;animation:confettiFly ${dur}s ease-out forwards;`;
    wrapper.appendChild(el);
    setTimeout(() => el.remove(), dur * 1000 + 100);
  }
}

function reroll() {
  document.getElementById('resultBody').innerHTML = '';
  document.getElementById('rerollBtn').style.display = 'none';
  document.getElementById('resultBadge').style.display = 'none';
  document.getElementById('badgeContent').classList.remove('pop');
  const slotEl = document.getElementById('slotText');
  slotEl.className = 'slot-text';
  slotEl.textContent = '?';
  setTimeout(startSlot, 60);
}

function openDeliveryApp(app, food) {
  const q = encodeURIComponent(food);
  const config = {
    baemin: {
      scheme: `baemin://search?query=${q}`,
      web: `https://www.baemin.com/find-restaurant?query=${q}`
    },
    coupang: {
      scheme: `coupangeats://search?keyword=${q}`,
      web: `https://www.coupangeats.com/`
    }
  };
  const { scheme, web } = config[app];

  // 앱이 설치돼 있으면 visibilitychange 로 감지, 없으면 웹 폴백
  let appOpened = false;
  const onVis = () => { if (document.hidden) appOpened = true; };
  document.addEventListener('visibilitychange', onVis);

  window.location.href = scheme;

  setTimeout(() => {
    document.removeEventListener('visibilitychange', onVis);
    if (!appOpened) window.open(web, '_blank');
  }, 1400);
}

let weatherLoaded = false;
let weatherPanelOpen = false;
let weatherRecOpen = false;

function toggleWeatherRec() {
  weatherRecOpen = !weatherRecOpen;
  document.getElementById('weatherRecBody').classList.toggle('open', weatherRecOpen);
  document.getElementById('weatherRecBtn').classList.toggle('open', weatherRecOpen);
}

function toggleWeather() {
  const panel = document.getElementById('weatherPanel');
  const btn = document.getElementById('weatherBtn');
  weatherPanelOpen = !weatherPanelOpen;
  panel.classList.toggle('open', weatherPanelOpen);
  btn.classList.toggle('active', weatherPanelOpen);
  if (!weatherPanelOpen) { weatherRecOpen = false; }
  if (weatherPanelOpen && !weatherLoaded) fetchWeather();
}

function getWeatherCategory(code, temp) {
  if (temp <= 5) return 'cold';
  if (code >= 71 && code <= 77 || code === 85 || code === 86) return 'snowy';
  if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82) || code === 95 || code === 96 || code === 99) return 'rainy';
  if (code === 3 || code === 45 || code === 48) return 'cloudy';
  if (temp >= 27) return 'sunny_hot';
  return 'sunny_mild';
}

function getWeatherIcon(code, temp) {
  if (temp <= 5) return '🥶';
  if (code === 0) return temp >= 27 ? '🌡️☀️' : '☀️';
  if (code <= 2) return '🌤️';
  if (code === 3) return '☁️';
  if (code === 45 || code === 48) return '🌫️';
  if (code >= 51 && code <= 57) return '🌦️';
  if (code >= 61 && code <= 67) return '🌧️';
  if (code >= 71 && code <= 77) return '❄️';
  if (code >= 80 && code <= 82) return '🌧️';
  if (code === 85 || code === 86) return '🌨️';
  if (code >= 95) return '⛈️';
  return '🌤️';
}

function getWeatherLabel(code) {
  if (code === 0) return '맑음';
  if (code <= 2) return '대체로 맑음';
  if (code === 3) return '흐림';
  if (code === 45 || code === 48) return '안개';
  if (code >= 51 && code <= 57) return '이슬비';
  if (code >= 61 && code <= 67) return '비';
  if (code >= 71 && code <= 77) return '눈';
  if (code >= 80 && code <= 82) return '소나기';
  if (code === 85 || code === 86) return '눈 소나기';
  if (code >= 95) return '뇌우';
  return '흐림';
}

async function fetchWeather() {
  const content = document.getElementById('weatherContent');
  content.innerHTML = '<div class="weather-loading">📍 위치를 확인하는 중...</div>';

  try {
    let lat, lon, cityName;
    try {
      const pos = await new Promise((res, rej) =>
        navigator.geolocation.getCurrentPosition(res, rej, { timeout: 7000 })
      );
      lat = pos.coords.latitude;
      lon = pos.coords.longitude;
    } catch {
      lat = 37.5665; lon = 126.9780; cityName = '서울';
    }

    const [weatherResp, geoResp] = await Promise.all([
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weathercode&timezone=auto`),
      cityName ? Promise.resolve(null) : fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
    ]);

    const wData = await weatherResp.json();
    if (!cityName && geoResp) {
      const gData = await geoResp.json();
      cityName = gData.address?.city || gData.address?.town || gData.address?.county || '현재 위치';
    }

    const temp = Math.round(wData.current.temperature_2m);
    const apparent = Math.round(wData.current.apparent_temperature);
    const code = wData.current.weathercode;
    const category = getWeatherCategory(code, temp);
    const rec = WEATHER_RECOMMEND[category];

    content.innerHTML = `
      <div class="weather-main">
        <span class="weather-icon-big">${getWeatherIcon(code, temp)}</span>
        <div>
          <div class="weather-temp-num">${temp}°C</div>
          <div class="weather-desc">${getWeatherLabel(code)} · 체감 ${apparent}°C</div>
          <div class="weather-location">📍 ${cityName}</div>
        </div>
      </div>
      <button class="weather-rec-btn" id="weatherRecBtn" onclick="toggleWeatherRec()">
        <span>🍽️ ${rec.label} — 추천 음식 보기</span>
        <span class="weather-rec-arrow">▼</span>
      </button>
      <div class="weather-rec-body" id="weatherRecBody">
        <div class="weather-rec-inner">
          <div class="weather-rec-title">${rec.desc}</div>
          <div class="weather-food-grid">
            ${rec.foods.map(f => `
              <div class="weather-food-card">
                <div class="weather-food-name">${f.emoji} ${f.name}</div>
                <div class="weather-food-reason">${f.reason}</div>
              </div>`).join('')}
          </div>
        </div>
      </div>`;

    document.getElementById('weatherBtnIcon').textContent = getWeatherIcon(code, temp).slice(0, 2);
    document.getElementById('weatherBtnLabel').textContent = `${temp}°C`;
    weatherLoaded = true;
  } catch (e) {
    content.innerHTML = `<div class="weather-error">😅 날씨 정보를 불러오지 못했어요.<br>잠시 후 다시 눌러주세요.</div>`;
  }
}

function openPartner() {
  document.getElementById('partnerOverlay').classList.add('open');
}
function closePartner() {
  document.getElementById('partnerOverlay').classList.remove('open');
}
function closePartnerOnBg(e) {
  if (e.target === document.getElementById('partnerOverlay')) closePartner();
}

async function submitPartner(e) {
  e.preventDefault();
  const btn = document.getElementById('partnerSubmitBtn');
  btn.disabled = true;
  btn.textContent = '전송 중...';

  try {
    const res = await fetch('https://formspree.io/f/xpqnyndb', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        name: document.getElementById('pName').value,
        email: document.getElementById('pEmail').value,
        message: document.getElementById('pMsg').value,
      })
    });

    if (res.ok) {
      document.getElementById('partnerFormWrap').innerHTML = `
        <div class="form-success">
          <div class="form-success-icon">✅</div>
          <div class="form-success-title">문의가 접수됐어요!</div>
          <div class="form-success-desc">빠른 시일 내에 입력하신 이메일로<br>연락드리겠습니다. 감사합니다 🙏</div>
        </div>`;
    } else {
      throw new Error();
    }
  } catch {
    btn.disabled = false;
    btn.textContent = '문의 보내기';
    alert('전송에 실패했어요. 잠시 후 다시 시도해주세요.');
  }
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeIcon').textContent = isDark ? '🌙' : '☀️';
  document.getElementById('themeLabel').textContent = isDark ? '다크 모드' : '라이트 모드';
}
