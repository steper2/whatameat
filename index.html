<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>시발 뭐먹지</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root[data-theme="dark"] {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #333;
      --text: #ffffff;
      --text-sub: #999;
      --accent: #f5e642;
      --accent-hover: #ffe000;
      --delivery: #ff6b35;
      --cook: #4ecdc4;
      --card-shadow: 0 4px 24px rgba(0,0,0,0.6);
      --modal-bg: rgba(0,0,0,0.85);
    }
    :root[data-theme="light"] {
      --bg: #f0f0f0;
      --surface: #ffffff;
      --surface2: #e8e8e8;
      --border: #ddd;
      --text: #111;
      --text-sub: #666;
      --accent: #111;
      --accent-hover: #333;
      --delivery: #e55a2b;
      --cook: #2a9d8f;
      --card-shadow: 0 4px 24px rgba(0,0,0,0.12);
      --modal-bg: rgba(0,0,0,0.6);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', system-ui, sans-serif;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
    }
    .app-title {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1;
    }
    .app-title span { color: var(--accent); }
    .theme-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s, transform 0.1s;
    }
    .theme-btn:hover { background: var(--border); transform: scale(1.04); }

    /* ── MAIN ── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 36px 20px 60px;
    }
    .subtitle {
      text-align: center;
      color: var(--text-sub);
      font-size: 0.9rem;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    /* ── MEAL CARDS ── */
    .meal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }
    .meal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: var(--card-shadow);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .meal-card:hover { transform: translateY(-4px); box-shadow: 0 12px 36px rgba(0,0,0,0.3); }
    .meal-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .meal-emoji { font-size: 2.4rem; }
    .meal-label { font-size: 1.3rem; font-weight: 900; }
    .meal-sub { font-size: 0.78rem; color: var(--text-sub); margin-top: 2px; }
    .action-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .action-btn {
      border: none;
      border-radius: 12px;
      padding: 14px 10px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: transform 0.15s, filter 0.15s;
    }
    .action-btn:hover { transform: scale(1.04); filter: brightness(1.15); }
    .action-btn:active { transform: scale(0.97); }
    .action-btn .btn-emoji { font-size: 1.6rem; }
    .btn-delivery {
      background: var(--delivery);
      color: #fff;
    }
    .btn-cook {
      background: var(--cook);
      color: #fff;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: var(--modal-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      padding: 20px;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px 28px;
      width: 100%;
      max-width: 520px;
      max-height: 88vh;
      overflow-y: auto;
      transform: translateY(30px) scale(0.96);
      transition: transform 0.3s;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal-overlay.open .modal { transform: translateY(0) scale(1); }
    .modal-close {
      float: right;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      width: 34px; height: 34px;
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      margin-left: 10px;
    }
    .modal-context {
      font-size: 0.8rem;
      color: var(--text-sub);
      margin-bottom: 18px;
    }

    /* ── SLOT MACHINE ── */
    .slot-wrapper {
      text-align: center;
      padding: 20px 0 28px;
    }
    .slot-display {
      font-size: 3.2rem;
      font-weight: 900;
      letter-spacing: -1px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .slot-text {
      display: inline-block;
      transition: none;
    }
    .slot-text.spinning {
      animation: slotSpin 0.08s steps(1) infinite;
    }
    .slot-text.landing {
      animation: slotLand 0.4s cubic-bezier(.17,.67,.35,1.2) forwards;
    }
    @keyframes slotSpin {
      0%   { transform: translateY(-10%); opacity: 0.7; }
      50%  { transform: translateY(10%); opacity: 1; }
      100% { transform: translateY(-10%); opacity: 0.7; }
    }
    @keyframes slotLand {
      0%   { transform: scale(1.3); opacity: 0; }
      60%  { transform: scale(0.95); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .slot-result-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #111;
      border-radius: 50px;
      padding: 6px 18px;
      font-size: 0.85rem;
      font-weight: 700;
      margin-top: 8px;
    }

    /* ── DELIVERY RESULT ── */
    .delivery-result { margin-top: 4px; }
    .delivery-result h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-sub);
    }
    .delivery-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 6px 14px;
      font-size: 0.88rem;
      font-weight: 700;
    }
    .delivery-tip {
      margin-top: 16px;
      background: var(--surface2);
      border-left: 3px solid var(--delivery);
      border-radius: 0 10px 10px 0;
      padding: 12px 14px;
      font-size: 0.83rem;
      color: var(--text-sub);
      line-height: 1.5;
    }

    /* ── RECIPE CARDS ── */
    .recipe-section h3 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-sub);
      margin-bottom: 14px;
    }
    .recipe-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 14px;
    }
    .recipe-head {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 14px;
    }
    .recipe-icon { font-size: 2.4rem; flex-shrink: 0; }
    .recipe-title { font-size: 1.05rem; font-weight: 900; }
    .recipe-chef {
      font-size: 0.78rem;
      color: var(--text-sub);
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .recipe-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .meta-tag {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 3px 10px;
      font-size: 0.77rem;
      color: var(--text-sub);
    }
    .recipe-ingredients {
      margin-bottom: 12px;
    }
    .recipe-ingredients h4, .recipe-steps h4 {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-sub);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .ingredient-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .ing {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 9px;
      font-size: 0.8rem;
    }
    .step-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .step-item {
      display: flex;
      gap: 10px;
      font-size: 0.85rem;
      line-height: 1.5;
    }
    .step-num {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--accent);
      color: #111;
      font-size: 0.72rem;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
    }
    .rating { color: #f5c842; }

    /* ── REROLL BTN ── */
    .reroll-btn {
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      border: 2px dashed var(--border);
      background: transparent;
      color: var(--text-sub);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .reroll-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--surface2);
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="app-title"><span>시발</span> 뭐먹지 🍽️</div>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">
    <span id="themeIcon">☀️</span>
    <span id="themeLabel">라이트 모드</span>
  </button>
</header>

<main>
  <p class="subtitle">
    매일 반복되는 고민... 이제 그만해.<br>
    아침·점심·저녁 눌러서 바로 결정하자.
  </p>

  <div class="meal-grid">
    <div class="meal-card">
      <div class="meal-card-header">
        <span class="meal-emoji">☀️</span>
        <div>
          <div class="meal-label">아침 뭐먹지</div>
          <div class="meal-sub">오늘 아침은 뭘 먹을까?</div>
        </div>
      </div>
      <div class="action-btns">
        <button class="action-btn btn-delivery" onclick="openModal('아침', '배달')">
          <span class="btn-emoji">🛵</span>배달
        </button>
        <button class="action-btn btn-cook" onclick="openModal('아침', '요리')">
          <span class="btn-emoji">🧑‍🍳</span>요리
        </button>
      </div>
    </div>

    <div class="meal-card">
      <div class="meal-card-header">
        <span class="meal-emoji">🌞</span>
        <div>
          <div class="meal-label">점심 뭐먹지</div>
          <div class="meal-sub">점심 메뉴 결정 전쟁 종료</div>
        </div>
      </div>
      <div class="action-btns">
        <button class="action-btn btn-delivery" onclick="openModal('점심', '배달')">
          <span class="btn-emoji">🛵</span>배달
        </button>
        <button class="action-btn btn-cook" onclick="openModal('점심', '요리')">
          <span class="btn-emoji">🧑‍🍳</span>요리
        </button>
      </div>
    </div>

    <div class="meal-card">
      <div class="meal-card-header">
        <span class="meal-emoji">🌕</span>
        <div>
          <div class="meal-label">저녁 뭐먹지</div>
          <div class="meal-sub">퇴근 후 뭐 먹을지 고민 끝</div>
        </div>
      </div>
      <div class="action-btns">
        <button class="action-btn btn-delivery" onclick="openModal('저녁', '배달')">
          <span class="btn-emoji">🛵</span>배달
        </button>
        <button class="action-btn btn-cook" onclick="openModal('저녁', '요리')">
          <span class="btn-emoji">🧑‍🍳</span>요리
        </button>
      </div>
    </div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeOnBg(event)">
  <div class="modal" id="modalContent">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-context" id="modalContext"></div>

    <!-- Slot -->
    <div class="slot-wrapper">
      <div class="slot-display">
        <span class="slot-text" id="slotText">?</span>
      </div>
      <div id="resultBadge" style="margin-top:8px;display:none">
        <span class="slot-result-badge" id="badgeContent"></span>
      </div>
    </div>

    <!-- Result body -->
    <div id="resultBody"></div>

    <button class="reroll-btn" id="rerollBtn" style="display:none" onclick="reroll()">
      🎲 다시 뽑기
    </button>
  </div>
</div>

let currentMeal = '';
let currentType = '';
let currentFood = '';

function openModal(meal, type) {
  currentMeal = meal;
  currentType = type;
  document.getElementById('modalContext').textContent =
    `${meal === '아침' ? '☀️' : meal === '점심' ? '🌞' : '🌕'} ${meal}  ·  ${type === '배달' ? '🛵 배달' : '🧑‍🍳 요리'}`;
  document.getElementById('resultBody').innerHTML = '';
  document.getElementById('rerollBtn').style.display = 'none';
  document.getElementById('resultBadge').style.display = 'none';

  document.getElementById('modalOverlay').classList.add('open');
  startSlot();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function closeOnBg(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function startSlot() {
  const slotEl = document.getElementById('slotText');
  slotEl.className = 'slot-text spinning';

  let tick = 0;
  const spinDuration = 1600;
  const interval = setInterval(() => {
    slotEl.textContent = CATEGORIES[tick % CATEGORIES.length];
    tick++;
  }, 80);

  setTimeout(() => {
    clearInterval(interval);
    const picked = CATEGORIES[Math.floor(Math.random() * CATEGORIES.length)];
    currentFood = picked;
    slotEl.textContent = picked;
    slotEl.className = 'slot-text landing';

    const badge = document.getElementById('resultBadge');
    document.getElementById('badgeContent').textContent = `${EMOJI_MAP[picked]} ${picked} 확정!`;
    badge.style.display = 'block';

    document.getElementById('rerollBtn').style.display = 'block';
    showResult(picked);
  }, spinDuration);
}

function showResult(food) {
  const body = document.getElementById('resultBody');
  if (currentType === '배달') {
    const data = DELIVERY[food];
    body.innerHTML = `
      <div class="delivery-result">
        <h3>추천 메뉴</h3>
        <div class="delivery-chips">
          ${data.suggestions.map(s => `<span class="chip">${s}</span>`).join('')}
        </div>
        <div class="delivery-tip">💡 ${data.tip}</div>
      </div>`;
  } else {
    const list = RECIPES[food];
    body.innerHTML = `
      <div class="recipe-section">
        <h3>⭐ 유명 셰프 추천 레시피</h3>
        ${list.map(r => `
          <div class="recipe-card">
            <div class="recipe-head">
              <span class="recipe-icon">${r.icon}</span>
              <div>
                <div class="recipe-title">${r.name}</div>
                <div class="recipe-chef"><span class="rating">★</span> ${r.rating} &nbsp;·&nbsp; ${r.chef}</div>
              </div>
            </div>
            <div class="recipe-meta">
              <span class="meta-tag">⏱ ${r.time}</span>
              <span class="meta-tag">🔥 ${r.difficulty}</span>
            </div>
            <div class="recipe-ingredients">
              <h4>재료</h4>
              <div class="ingredient-list">
                ${r.ingredients.map(i => `<span class="ing">${i}</span>`).join('')}
              </div>
            </div>
            <div class="recipe-steps">
              <h4>조리 순서</h4>
              <ol class="step-list">
                ${r.steps.map((s, i) => `
                  <li class="step-item">
                    <span class="step-num">${i + 1}</span>
                    <span>${s}</span>
                  </li>`).join('')}
              </ol>
            </div>
          </div>`).join('')}
      </div>`;
  }
}

function reroll() {
  document.getElementById('resultBody').innerHTML = '';
  document.getElementById('rerollBtn').style.display = 'none';
  document.getElementById('resultBadge').style.display = 'none';
  const slotEl = document.getElementById('slotText');
  slotEl.className = 'slot-text';
  slotEl.textContent = '?';
  setTimeout(() => startSlot(), 50);
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeIcon').textContent = isDark ? '🌙' : '☀️';
  document.getElementById('themeLabel').textContent = isDark ? '다크 모드' : '라이트 모드';
}
</script>
